<div class="group-container general-container p-4">
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>

    <div class="page-header mt-2 mb-4 flex justify-content-between align-items-center">
        <div class="header-left flex align-items-center gap-2">
            <p-button icon="pi pi-arrow-left" [text]="true" (onClick)="goBack()" />
            <h1 class="m-0"> Mis espacios de trabajo </h1>
        </div>
        <div class="header-actions">
           <p-button *hasPermission="'group:add'" label="Nuevo Grupo" icon="pi pi-plus" (onClick)="openNewGroup()"></p-button>
        </div>
    </div>

    @if (groups && groups.length > 0) {
        <div class="grid mt-4">
            @for (group of groups; track group.id) {
                <div class="col-12 md:col-6 lg:col-4 mb-4 mt-2">
                    <p-card styleClass="bg-white" [style]="{ 'height': '100%', 'display': 'flex', 'flex-direction': 'column' }">
                        <ng-template pTemplate="title">
                            <div class="flex justify-content-between align-items-center mb-2">
                                <span class="text-xl font-semibold m-0 text-900" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" [pTooltip]="group.name">{{ group.name }}</span>
                                <p-tag [value]="group.members.length + ' miembros'" severity="info"></p-tag>
                            </div>
                        </ng-template>
                        <ng-template pTemplate="subtitle">
                            <span class="text-600">Creado recientemente</span>
                        </ng-template>
                        
                        <p class="m-0 text-700 line-height-3 mb-4 mt-2" style="flex: 1;">
                            {{ group.description || 'Sin descripción disponible.' }}
                        </p>

                        <ng-template pTemplate="footer">
                            <div class="flex flex-column gap-2 mt-auto border-top-1 surface-border pt-4 mt-3">
                                <div class="flex justify-content-between w-full">
                                    <p-button 
                                        icon="pi pi-briefcase" 
                                        label="Tickets" 
                                        severity="info" 
                                        [style]="{ width: '100%' }"
                                        class="mr-2 flex-1"
                                        (onClick)="selectGroup(group)">
                                    </p-button>
                                    <p-button 
                                        icon="pi pi-cog" 
                                        [outlined]="true" 
                                        label="Gestionar"
                                        severity="secondary" 
                                        [style]="{ width: '100%' }"
                                        class="flex-1"
                                        pTooltip="Miembros y Config"
                                        (onClick)="goToAdmin(group)">
                                    </p-button>
                                </div>
                                <p-button 
                                    *hasPermission="'group:delete'" 
                                    icon="pi pi-trash" 
                                    [text]="true" 
                                    label="Eliminar espacio"
                                    severity="danger"
                                    class="w-full mt-2"
                                    (onClick)="deleteGroup(group)">
                                </p-button>
                            </div>
                        </ng-template>
                    </p-card>
                </div>
            }
        </div>
    } @else {
        <div class="flex flex-column align-items-center justify-content-center p-5 mt-4 surface-100 border-round">
            <i class="pi pi-folder-open text-500 mb-3" style="font-size: 3rem;"></i>
            <p class="text-600 m-0">No perteneces a ningún grupo activo.</p>
        </div>
    }



    <p-dialog [(visible)]="groupDialog" header="Configuración de Grupo" [modal]="true" styleClass="p-fluid">
        <div class="field mt-3" *ngIf="selectedGroup">
            <label for="name">Nombre del Grupo</label>
            <input type="text" pInputText id="name" [(ngModel)]="selectedGroup.name" required autofocus />
            <small class="p-error" *ngIf="submitted && !selectedGroup.name">El nombre es requerido.</small>
        </div>
        <div class="field mt-3" *ngIf="selectedGroup">
            <label for="description">Descripción</label>
            <textarea id="description" pTextarea [(ngModel)]="selectedGroup.description" rows="3"></textarea>
        </div>
        <ng-template pTemplate="footer">
            <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="groupDialog = false"></p-button>
            <p-button label="Guardar" icon="pi pi-check" [text]="true" (onClick)="saveGroup()"></p-button>
        </ng-template>
    </p-dialog>
</div>
