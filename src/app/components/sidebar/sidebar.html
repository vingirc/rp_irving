<div class="sidebar-container" [class.collapsed]="isCollapsed">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon-container">
                <span class="emoji-icon">🔒</span>
            </div>
            <span class="logo-text">SecureApp</span>
        </div>

        <button class="toggle-btn" (click)="toggleSidebar()">
            <i class="pi" [ngClass]="isCollapsed ? 'pi-angle-right' : 'pi-angle-left'"></i>
        </button>
    </div>

    <div class="sidebar-menu">
        <div class="menu-section">Navegación</div>

        <a *ngFor="let item of menuItems" [routerLink]="item.path" routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact: item.exact}" class="menu-item" [title]="isCollapsed ? item.title : ''">
            <i [class]="item.icon"></i>
            <span class="menu-text">{{item.title}}</span>
        </a>

        <a routerLink="/" class="menu-item" [title]="isCollapsed ? 'Landing Page' : ''">
            <i class="pi pi-globe"></i>
            <span class="menu-text">Landing Page</span>
        </a>

        <div class="menu-divider"></div>

        <div class="menu-section mt-auto">Sesión</div>

        <a routerLink="/login" class="menu-item logout" [title]="isCollapsed ? 'Cerrar Sesión' : ''">
            <i class="pi pi-sign-out"></i>
            <span class="menu-text">Cerrar Sesión</span>
        </a>

        <div class="version-status">
            <span class="menu-text">Versión en desarrollo</span>
        </div>
    </div>
</div>
