<div class="sidebar-container">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon-container">
                <span class="emoji-icon">🔒</span>
            </div>
            <span>SecureApp</span>
        </div>
    </div>

    <div class="sidebar-menu">
        <div class="menu-section">Navegación</div>

        <a *ngFor="let item of menuItems" [routerLink]="item.path" routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact: item.exact}" class="menu-item">
            <i [class]="item.icon"></i>
            <span>{{item.title}}</span>
        </a>

        <a routerLink="/" class="menu-item">
            <i class="pi pi-globe"></i>
            <span>Landing Page</span>
        </a>

        <!-- Divisor -->
        <div class="menu-divider"></div>

        <div class="menu-section mt-auto">Sesión</div>

        <a routerLink="/login" class="menu-item logout">
            <i class="pi pi-sign-out"></i>
            <span>Cerrar Sesión</span>
        </a>

        <div class="version-status">
            <span>Versión en desarrollo</span>
        </div>
    </div>
</div>
